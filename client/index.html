<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Inspector - Telemetry HUD</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="control-panel">
        <div class="connection-box">
            <h2>Telemetry Link</h2>
            <div class="input-group">
                <input type="text" id="ipAddress" placeholder="e.g. 192.168.1.100" value="127.0.0.1">
                <button id="connectBtn">Connect</button>
            </div>
            <div class="status">Status: <span id="statusIndicator">Disconnected</span></div>
        </div>
        
        <div class="data-box">
            <div class="data-item heading-item">
                <span class="label">HEADING</span>
                <span class="value" id="valYaw">0.0°</span>
                <span class="value cardinal" id="valCardinal">N</span>
            </div>
            <div class="data-item">
                <span class="label">PITCH</span>
                <span class="value" id="valPitch">0.0°</span>
            </div>
            <div class="data-item">
                <span class="label">ROLL</span>
                <span class="value" id="valRoll">0.0°</span>
            </div>
        </div>
    </div>

    <div class="hud-container">
        <!-- Crosshair in the center -->
        <div class="crosshair"></div>

        <!-- Artificial Horizon (Pitch/Roll) -->
        <div class="artificial-horizon" id="horizonGroup">
            <div class="horizon-line"></div>
            <!-- Pitch ladder -->
            <div class="pitch-ladder" id="pitchLadder">
                <!-- Ladder lines are generated via CSS or JS, simplified here -->
                <div class="ladder-mark" style="top: -60px;"><span>30</span> <div class="line"></div> <span>30</span></div>
                <div class="ladder-mark" style="top: -30px;"><span>15</span> <div class="line"></div> <span>15</span></div>
                <div class="ladder-mark" style="top: 30px;"><span>-15</span> <div class="line"></div> <span>-15</span></div>
                <div class="ladder-mark" style="top: 60px;"><span>-30</span> <div class="line"></div> <span>-30</span></div>
            </div>
        </div>

        <!-- Heading Dial at the bottom -->
        <div class="heading-gauge">
            <div class="heading-display">
                <div class="heading-cardinal" id="hudCardinalDir">N</div>
                <div class="heading-value" id="hudYawValue">000.0°</div>
            </div>
            <div class="compass-dial" id="compassDial">
                <!-- Tick marks will be generated by JS -->
            </div>
            <div class="compass-pointer"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
